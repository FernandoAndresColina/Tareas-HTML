<!doctype html>
<html lang="es">
  <head>
    <!-- Título para el navegador y los buscadores -->
    <title>Clase 12 - Formularios en HTML</title>

    <!-- Descripción de la página para los buscadores -->
    <meta name="description" content="Tarea 12: Formularios en HTML" />

    <!-- Palabras clave para los buscadores -->
    <meta name="keywords" content="p, h1, h2, h3, h4, h5" />

    <!-- Autor de la página -->
    <meta name="author" content="Fernando Luque Colina" />

    <!-- Favicon de la página -->
    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <!-- Codificación-->
    <meta charset="UTF-8" />

    <!-- Para que la web sea responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Para algunos navegadores móviles -->
    <meta name="theme-color" content="#1e7bbf" />
  </head>

  <body>
    <header>
      <h1>Formulario HTML</h1>
      <p><a href="index.html">👈 Volver atrás</a></p>
      <hr />
    </header>
    <main>
      <h2>Información sobre el producto</h2>
      <form action="" method="post" enctype="multipart/form-data">
        <fieldset>
          <legend>Datos básicos</legend>
          <p>
            <label for="name">Nombre</label><br />
            <input type="text" name="name" id="name" />
          </p>
          <p>
            <label for="description">Descripción</label><br />
            <textarea
              name="description"
              id="description"
              cols="30"
              rows="5"
            ></textarea>
          </p>
          <p>
            <label for="foto">Foto</label>
            <input type="file" name="foto" id="foto" />
          </p>
          <p>
            <input type="checkbox" name="contador" id="contador" />
            <label for="contador">Añadir contador de visitas</label>
          </p>
        </fieldset>
        <fieldset>
          <legend>Datos económicos</legend>
          <p>
            <label for="precio">Precio:</label>
            <input type="number" name="precio" id="precio" step="0.5" min="0" />
            $
            <label for="impuestos">Impuestos:</label>
            <select name="impuestos" id="impuestos">
              <option value="">-</option>
              <option value="4">4%</option>
              <option value="7">7%</option>
              <option value="16">16%</option>
              <option value="25">25%</option>
            </select>
          </p>
          <div>
            <p>
                Promoción: <br>
                <input type="radio" name="promocion"/ value="" id="ninguno">
                <label for="ninguno">Ninguno</label>
            </p>
                <input type="radio" name="promocion"/ value="" id="promo1">
                <label for="promo1">Transporte gratuito</label>
            </p>
            <p>
                <input type="radio" name="promocion"/ value="" id="promo2">
                <label for="promo2">Descuento 5%</label>
            </p>
            </div>
        </fieldset>
        <p>
            <button>Enviar</button>
        </p>
      </form>
    </main>
    <hr />
    <footer>© Tu nombre o empresa 2026 - Todos los derechos reservados</footer>
  </body>
</html>
