<!doctype html>
<html lang="es">
  <head>
    <!-- Título para el navegador y los buscadores -->
    <title>Clase 12 - Formularios en HTML</title>

    <!-- Descripción de la página para los buscadores -->
    <meta name="description" content="Tarea 12: Formularios en HTML" />

    <!-- Palabras clave para los buscadores -->
    <meta name="keywords" content="p, h1, h2, h3, h4, h5" />

    <!-- Autor de la página -->
    <meta name="author" content="Fernando Luque Colina" />

    <!-- Favicon de la página -->
    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <!-- Codificación-->
    <meta charset="UTF-8" />

    <!-- Para que la web sea responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Para algunos navegadores móviles -->
    <meta name="theme-color" content="#1e7bbf" />
  </head>

  <body>
    <header>
      <h1>Formulario HTML</h1>
      <p><a href="index.html">👈 Volver atrás</a></p>
      <hr />
    </header>
    <main>
      <h2>Formulario estructurado</h2>
      <form action="" method="get">
        <fieldset>
          <legend>Datos personales</legend>
          <p>
            <label for="name">Nombre</label><br />
            <input type="text" name="name" id="name" />
          </p>
          <p>
            <label for="lastname">Apellido</label><br />
            <input type="text" name="lastname" id="lastname" />
          </p>
          <p>
            <label for="id">DNI</label><br />
            <input type="text" name="id" id="id" maxlength="9" size="9" />
          </p>
        </fieldset>
        <fieldset>
          <legend>Datos de conexión</legend>
          <p>
            <label for="user">Nombre de usuario</label><br />
            <input type="text" name="user" id="user" />
          </p>
          <p>
            <label for="password">Contraseña</label><br />
            <input type="password" name="password" id="password" />
          </p>
          <p>
            <label for="repeat">Repite contraseña</label><br />
            <input type="password" name="repeat" id="repeat" />
          </p>
        </fieldset>
      </form>
    </main>
    <hr />
    <footer>© Tu nombre o empresa 2026 - Todos los derechos reservados</footer>
  </body>
</html>
