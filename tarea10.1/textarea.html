<!doctype html>
<html lang="es">
  <head>
    <!-- Título para el navegador y los buscadores -->
    <title>Clase 11 - Formularios en HTML</title>

    <!-- Descripción de la página para los buscadores -->
    <meta
      name="description"
      content="Página de ejemplos vistos en la clase 11: Formularios en HTML"
    />

    <!-- Palabras clave para los buscadores -->
    <meta name="keywords" content="p, h1, h2, h3, h4, h5" />

    <!-- Autor de la página -->
    <meta name="author" content="Fernando Luque Colina" />

    <!-- Favicon de la página -->
    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <!-- Codificación-->
    <meta charset="UTF-8" />

    <!-- Para que la web sea responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Para algunos navegadores móviles -->
    <meta name="theme-color" content="#1e7bbf" />
  </head>

  <body>
    <header>
      <h1>Ejemplos vistos en la Clase 11: Formularos en HTML</h1>
      <p><a href="index.html">👈 Volver atrás</a></p>
      <hr />
    </header>
    <main>
      <h1>Formulario sencillo</h1>
      <form
        action="/registrar_cliente/"
        name="registro"
        method="post"
        autocomplete="off"
        enctype="multipart/form-data"
      >
        <input type="hidden" name="company" value="holamundo" />
        <p>
          Nombre
          <input type="text" name="nombre" placeholder="Carlos" size="15" autocomplete="off"/>
        </p>
        <p>
          Apellidos
          <input type="text" name="apellido" placeholder="Richard" size="25" autocomplete="off"/>
        </p>
        <p>
          País
          <input type="text" name="pais" size="25" autocomplete="off" />
        </p>
        <p>
          Edad
          <input type="number" name="edad" min="0" max="100" />
        </p>
        <p>
            <label for="bio">Biografia</label><br/>
            <textarea name="bio" id="bio" cols="30" rows="10"></textarea>
        </p>
        <p>
          Email
          <input type="email" name="email" placeholder="email" />
        </p>
        <p>
          Password
          <input type="password" name="clave" />
        </p>
        <p>
          Indica tu pagina web
          <input type="url" name="web" placeholder="https://www.ejemplo.com" />
        </p>
        <p>
          Danos tu foto
          <input type="file" name="foto" />
        </p>
        <button>Enviar</button>
        <input type="submit" value="Enviar a otro sitio" />
        <input type="reset" value="Borrar datos" />
      </form>
    </main>
    <hr />
    <footer>© Tu nombre o empresa 2026 - Todos los derechos reservados</footer>
  </body>
</html>
