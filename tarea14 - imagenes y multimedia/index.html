<!doctype html>
<html lang="es">
  <head>
    <!-- Título para el navegador y los buscadores -->
    <title>Clase 13 - ejemplo de imagenes y multimedia</title>

    <!-- Descripción de la página para los buscadores -->
    <meta name="description" content="Página de ejemplos vistos en clase" />

    <!-- Palabras clave para los buscadores -->
    <meta name="keywords" content="p, h1, h2, h3, h4, h5" />

    <!-- Autor de la página -->
    <meta name="author" content="Fernando Luque Colina" />

    <!-- Favicon de la página -->
    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <!-- Codificación-->
    <meta charset="UTF-8" />

    <!-- Para que la web sea responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Para algunos navegadores móviles -->
    <meta name="theme-color" content="#1e7bbf" />
  </head>

  <body>
    <header>
      <h1>Imágenes en la web</h1>
      <hr />
    </header>
    <main>
      <h2>Ejemplo de imagen en el mismo directorio</h2>
      <figure>
        <figcaption>Imagen leyenda</figcaption>
        <img src="./relleno1.gif" alt="Este es el texto alternativo" />
      </figure>
      <h2>Ejemplo de imagen en el directorio img</h2>
      <img src="./img/relleno2.gif" alt="Este es el texto alternativo" />
      <h3>Imagen random</h3>
      <img loading="lazy" src="https://picsum.photos/seed/xx/800/300" alt="" />
      <img loading="lazy" src="https://picsum.photos/seed/xxa/800/300" alt="" />
      <img loading="lazy" src="https://picsum.photos/seed/xxb/800/300" alt="" />
      <h3>Servicios</h3>
      <a href="./servicios/servicios.html">Ir a servcios</a>
    </main>
    <footer>© 2026 - Todos los derechos reservados</footer>
  </body>
</html>
