<!doctype html>
<html lang="es">
  <head>
    <!-- Título para el navegador y los buscadores -->
    <title>Clase 12 - Formularios en HTML</title>

    <!-- Descripción de la página para los buscadores -->
    <meta name="description" content="Tarea 12: Formularios en HTML" />

    <!-- Palabras clave para los buscadores -->
    <meta name="keywords" content="p, h1, h2, h3, h4, h5" />

    <!-- Autor de la página -->
    <meta name="author" content="Fernando Luque Colina" />

    <!-- Favicon de la página -->
    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <!-- Codificación-->
    <meta charset="UTF-8" />

    <!-- Para que la web sea responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Para algunos navegadores móviles -->
    <meta name="theme-color" content="#1e7bbf" />
  </head>

  <body>
    <header>
      <h1>Formulario HTML</h1>
      <p><a href="index.html">👈 Volver atrás</a></p>
      <hr />
    </header>
    <main>
      <h2>Rellena tu CV</h2>
      <fieldset>
        <legend>Datos personales</legend>
        <p>
          <label for="provincias">Provincias</label><br />
          <select name="provincias" id="provincias">
            <option value="">- Selecciona -</option>
            <option value="BT">Bocas del Toro</option>
            <option value="C">Colón</option>
            <option value="CH">Chiriquí</option>
            <option value="D">Darién</option>
            <option value="H">Herrea</option>
            <option value="LS">Los Santos</option>
            <option value="P">Panamá</option>
            <option value="PO">Panamá Oeste</option>
            <option value="S">San Blas</option>
          </select>
        </p>
        <p>
          Fecha de Nacimiento <br />
          <input type="text" size="2" name="dia" /> de
          <select name="mes" id="mes">
            <option value="">-</option>
            <option value="1">Enenro</option>
            <option value="2">Febrero</option>
            <option value="3">Marzo</option>
            <option value="4">Abril</option>
            <option value="5">Mayo</option>
            <option value="6">Junio</option>
            <option value="7">Julio</option>
            <option value="8">Agosto</option>
            <option value="9">Septiembre</option>
            <option value="10">Octubre</option>
            <option value="11">Noviembre</option>
            <option value="12">Diciembre</option>
          </select>
          de
          <input type="text" name="year" size="4" />
        </p>
        <p>
          <label for="temas">Temas de interés</label><br />
          <select name="temas" id="temas" size="5" multiple>
            <option value="">Administración de bases de datos</option>
            <option value="">Análisis de programación</option>
            <option value="">Arquitectura</option>
            <option value="">Calidad</option>
            <option value="">ERP, CRM, Business Inteligent</option>
          </select>
        </p>
        <p></p>
      </fieldset>
      <br />
      <button>Enviar</button>
    </main>
    <hr />
    <footer>© Tu nombre o empresa 2026 - Todos los derechos reservados</footer>
  </body>
</html>
