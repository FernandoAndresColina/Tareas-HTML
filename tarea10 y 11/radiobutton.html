      name="description"
      content="Página de ejemplos vistos en la clase 10: Formularios en HTML"

  <body>
    <header>
      <h1>Ejemplos vistos en la Clase 11: Formularos en HTML</h1>
      <p><a href="index.html">👈 Volver atrás</a></p>
      <hr />
    </header>
    <main>
      <h2>Ejemplo de radio button</h2>

      <form action="#" method="get">
        <p>Seleccione el color deseado de sus zapatillas</p>
        <div>
            <p>
                <input type="radio" name="color" value="negro" id="black">
                <label for="black">Negro</label>
            </p>
            <p>
                <input type="radio" name="color" value="blanco" id="white">
                <label for="white">Blanco</label>
            </p>
            <p>
                <input type="radio" name="color" value="rojo" id="red">
                <label for="red">Rojo</label>
            </p>
        </div>
        <p>Seleccione la talla</p>
        <div>
          <p>
            <input type="radio" name="size" value="39" id="size39">
            <label for="size39">Talla 39</label>
          </p>
          <p>
            <input type="radio" name="size" value="40" id="size40">
            <label for="size40">Talla 40</label>
          </p>
        </div>
        

        <button>Enviar</button>

      </form>
    </main>
    <hr />

  </body>
