<!doctype html>
<html lang="es">
  <head>
    <!-- Título para el navegador y los buscadores -->
    <title>Clase 14 - Ejemplos Iframe</title>

    <!-- Descripción de la página para los buscadores -->
    <meta name="description" content="Tarea 14: etiquetas multimedia" />

    <!-- Palabras clave para los buscadores -->
    <meta name="keywords" content="p, h1, h2, h3, h4, h5" />

    <!-- Autor de la página -->
    <meta name="author" content="Fernando Luque Colina" />

    <!-- Favicon de la página -->
    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <!-- Codificación-->
    <meta charset="UTF-8" />

    <!-- Para que la web sea responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Para algunos navegadores móviles -->
    <meta name="theme-color" content="#1e7bbf" />
  </head>

  <body>
    <header>
      <h1>Ejemplo de Iframe con contenido de Name</h1>
      <p><a href="index.html">👈 Volver atrás</a></p>
      <hr />
    </header>
    <main>
      <h2>Ejemplo Iframe de Name</h2>
      <ul>
        <li>
          <a href="https://en.wikipedia.org/wiki/HTML" target="myframe"
            >Cargar Wikipedia de HTML</a
          >
        </li>
        <li>
          <a href="https://en.wikipedia.org/wiki/CSS" target="myframe"
            >Cargar Wikipedia de CSS</a
          >
        </li>
      </ul>
      <iframe
        src=""
        name="myframe"
        frameborder="0"
        width="1024"
        height="768"
      ></iframe>
    </main>
    <hr />
    <footer>© Tu nombre o empresa 2026 - Todos los derechos reservados</footer>
  </body>
</html>
