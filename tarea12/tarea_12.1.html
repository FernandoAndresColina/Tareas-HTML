<!doctype html>
<html lang="es">
  <head>
    <!-- Título para el navegador y los buscadores -->
    <title>Clase 12 - Formularios en HTML</title>

    <!-- Descripción de la página para los buscadores -->
    <meta name="description" content="Tarea 12: Formularios en HTML" />

    <!-- Palabras clave para los buscadores -->
    <meta name="keywords" content="p, h1, h2, h3, h4, h5" />

    <!-- Autor de la página -->
    <meta name="author" content="Fernando Luque Colina" />

    <!-- Favicon de la página -->
    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <!-- Codificación-->
    <meta charset="UTF-8" />

    <!-- Para que la web sea responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Para algunos navegadores móviles -->
    <meta name="theme-color" content="#1e7bbf" />
  </head>

  <body>
    <header>
      <h1>Formulario HTML</h1>
      <p><a href="index.html">👈 Volver atrás</a></p>
      <hr />
    </header>
    <main>
      <h2>Formulario de registro - Mi web</h2>
      <form action="" method="get">
        <p>
          <label for="name">Nombre</label>
          <input type="text" name="nombre" id="name" maxlength="50" />
        </p>
        <p>
          <label for="lastname">Apellido</label>
          <input type="text" name="apellido" id="lastname" maxlength="50" />
        </p>
        <p>
          Sexo: <br />
          <input type="radio" name="sexo" value="h" id="man" />
          <label for="man">Hombre</label><br />
          <input type="radio" name="sexo" value="m" id="woman" />
          <label for="woman">Mujer</label><br />
        </p>
        <p>
          <label for="mail">Email</label>
          <input type="mail" name="email" id="mail" />
        </p>
        <p>
          <label for="country">Población</label>
          <select name="country" id="country" required>
            <option value="">-</option>
            <option value="A">Alicante</option>
            <option value="M">Madrid</option>
            <option value="S">Sevilla</option>
            <option value="V">Valencia</option>
          </select>
        </p>
        <p>
          <label for="d">Descripción</label><br />
          <textarea
            name="descripcion"
            id="d"
            cols="30"
            rows="5"
            placeholder="Escribe una descripión"
          ></textarea>
        </p>
        <p>
          <input type="checkbox" name="news" id="news" checked />
          <label for="news"
            >Deseo recibir información sobre novedades y ofertas</label
          >
        </p>
        <p>
          <input type="checkbox" name="privacy" id="privacy" required />
          <label for="privacy"
            >Declaro haber leido y aceptar las condiciones generales del
            programa y la normativa sobre protección de datos</label
          >
        </p>
        <p>
          <button>Enviar</button>
        </p>
      </form>
    </main>
    <hr />
    <footer>© Tu nombre o empresa 2026 - Todos los derechos reservados</footer>
  </body>
</html>
