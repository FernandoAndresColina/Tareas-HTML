<!doctype html>
<html lang="es">
  <head>
    <!-- Título para el navegador y los buscadores -->
    <title>Clase 15 - Ejemplos de atributos</title>

    <!-- Descripción de la página para los buscadores -->
    <meta name="description" content="Tarea 15" />

    <!-- Palabras clave para los buscadores -->
    <meta name="keywords" content="p, h1, h2, h3, h4, h5" />

    <!-- Autor de la página -->
    <meta name="author" content="Fernando Luque Colina" />

    <!-- Favicon de la página -->
    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <!-- Codificación-->
    <meta charset="UTF-8" />

    <!-- Para que la web sea responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Para algunos navegadores móviles -->
    <meta name="theme-color" content="#1e7bbf" />

    <link
      href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css"
      rel="stylesheet"
    />
    <!-- jQuery es una dependencia de Select2, por lo que debe cargarse antes -->
    <script
      src="https://code.jquery.com/jquery-4.0.0.min.js"
      integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
      crossorigin="anonymous"
    ></script>
    <!-- Luego se carga el script de Select2 -->
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
  </head>

  <body>
    <header>
      <h1>Ejemplo de elemento</h1>
      <p><a href="index.html">👈 Volver atrás</a></p>
      <hr />
    </header>
    <main>
      <h2>Ejemplo de elemento select2</h2>
      <p>
        Seleciona tu lenguaje favorito:

        <select name="" id="weblangs">
          <option value="">-</option>
          <option value="1">HTML</option>
          <option value="2">CSS</option>
          <option value="3">Javascript</option>
          <option value="1">HTML</option>
          <option value="2">CSS</option>
          <option value="3">Javascript</option>
          <option value="1">HTML</option>
          <option value="2">CSS</option>
          <option value="3">Javascript</option>
        </select>
      </p>
    </main>
    <hr />
    <footer>© Tu nombre o empresa 2026 - Todos los derechos reservados</footer>

    <!-- Inicializar Select2 en el elemento select -->
    <script>
      $(document).ready(function () {
        $("#weblangs").select2();
      });
    </script>
  </body>
</html>
