  <main>
    <h1>Registro</h1>
    <p>Para poder acceder a la academia necesitamos que te registres</p>
    <form action="post" enctype="multipart/form-data">
      <p>
        <label for="name">Nombre completo</label>
        <input type="text" name="name" id="name" placeholder="Introduce tu nombre completo" required />
      </p>
      <p>
        <label for="birthday">Fecha de nacimiento</label>
        <input type="date" name="birthday" id="birthday" required />
      </p>

      <p>
        <label for="email">Email</label>
        <input type="email" name="email" id="email" placeholder="Introduce tu email" required />
      </p>

      <p>
        <label for="address">Dirección</label>
        <input type="text" name="address" id="address" placeholder="Introduce tu dirección" required />
      </p>

      <p>
        <label for="website">Página web</label>
        <input type="url" name="website" id="website" placeholder="Introduce la URL de tu página web">
      </p>

      <p>
        <label for="photo">Foto</label>
        <input type="file" name="photo" id="photo" accept="image/*">
      </p>

      <p>
        <label for="biography">Biografía</label><br>
        <textarea name="biography" id="biography" cols="30" rows="5" placeholder="Cuéntanos algo sobre ti"></textarea>
      </p>
      <p>
        <button>Enviar</button>
        <input type="reset" value="Limpiar formulario">
      </p>
    </form>
  </main>
