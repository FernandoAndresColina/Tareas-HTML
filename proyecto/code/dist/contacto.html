    <h1>Contacta con nosotros</h1>
    <p>Contacta con nostros y haz las consultas que necesites.</p>

    <section>
      <h2>Formulario</h2>

      <form action="">
        <p>
          <label for="name">Nombre completo</label>
          <input type="text" id="name" name="name" placeholder="Tu nombre completo" required />
        </p>
        <p>
          <label for="email">Email</label>
          <input type="email" name="email" id="email" placeholder="Introduce tu email" required />
        </p>
        <p>
          <label for="comment">Comentario</label><br>
          <textarea name="comment" id="comment" cols="30" rows="5" placeholder="En que te podemos ayudar..."></textarea>
        </p>
        <p>
          <button>Enviar</button>
          <input type="reset" value="Limpiar formulario">
        </p>
      </form>
    </section>
